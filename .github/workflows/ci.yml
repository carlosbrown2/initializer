name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The verification gate is the merge contract. Running it in CI means a PR
  # that breaks ralph.bats / parsers.bats / gate.bats is caught before merge,
  # not after. The gate invokes `bats tests/hooks/` and `bats tests/gate/`
  # as separate clauses; gate.bats lives outside tests/hooks/ so the gate's
  # own self-test cannot recursively re-enter the running gate.
  verification-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # business_mode_check validates that docs/business-mode.json's
          # switch_commit exists in repo history, so the gate needs more than
          # the default depth-1 checkout.
          fetch-depth: 0

      - name: Install system deps (bats, shellcheck, jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck jq python3-pip

      - name: Install bd (Beads CLI)
        run: |
          # CI pin: bd >= 0.3.0 (matches CLAUDE.md § Pinned Tool Versions).
          # Use the upstream install script — it handles platform detection,
          # GitHub-release download, and checksum verification. The npm
          # package's postinstall does not reliably pull the linux-x64
          # binary on GitHub Actions runners.
          curl -fsSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
          # install.sh typically drops bd in ~/.local/bin or /usr/local/bin;
          # make both visible to subsequent steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          # Sanity-check the binary is actually callable in *this* step too.
          export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
          bd --version

      - name: Install CI security scanners
        run: |
          mkdir -p "$HOME/.local/bin"
          GITLEAKS_VERSION=8.30.1
          GITLEAKS_ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}"
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${GITLEAKS_ARCHIVE}$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "$GITLEAKS_ARCHIVE" -C "$HOME/.local/bin" gitleaks
          python3 -m pip install --user dep-hallucinator
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          gitleaks version
          dep-hallucinator --help >/dev/null

      - name: Show tool versions
        run: |
          bash --version | head -1
          bats --version
          shellcheck --version | head -2
          jq --version
          bd --version
          gitleaks version
          dep-hallucinator --help >/dev/null

      - name: Run fail-closed secrets and dependency checks
        run: |
          command -v gitleaks >/dev/null || { echo "BLOCKED: gitleaks is required in CI." >&2; exit 1; }
          command -v dep-hallucinator >/dev/null || { echo "BLOCKED: dep-hallucinator is required in CI." >&2; exit 1; }
          gitleaks detect --source . --redact
          mapfile -t manifests < <(git ls-files 'requirements*.txt' 'package.json' 'pyproject.toml' 'Cargo.toml' 'go.mod')
          if [ "${#manifests[@]}" -gt 0 ]; then
            dep-hallucinator check "${manifests[@]}"
          fi

      - name: Run verification gate from CLAUDE.md
        run: |
          source scripts/hooks/parsers.sh
          GATE_CMD=$(gate_command_extract CLAUDE.md)
          if [ -z "$GATE_CMD" ]; then
            echo "BLOCKED: no verification gate found under '## Verification Gate' in CLAUDE.md." >&2
            exit 1
          fi
          bash -c "$GATE_CMD"

  # Markdown lint keeps prose drift out of load-bearing files (CLAUDE.md,
  # prompt.md, the registers). Relaxed config — line length and inline HTML
  # are disabled because the registers use long table rows and <!-- comments.
  # Note: shellcheck is not a separate job — it's part of the verification
  # gate clause above. Running it separately at a different severity could
  # let a CI pass while the gate fails, defeating the single-source rule.
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          # Config lives in .markdownlint.jsonc at the repo root so editor
          # integrations and CI read the same rules. The env-var form is
          # not honored by markdownlint-cli2 — config must come from a file.
          config: .markdownlint.jsonc
          globs: |
            **/*.md
            !**/node_modules
            !.beads/**
